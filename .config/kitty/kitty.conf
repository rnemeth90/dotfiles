# Font settings
font_family      Hack
font_size        12.0

# Colors
foreground       #c5c8c6
background       #1d1f21
cursor           #c5c8c6
cursor_text_color #1d1f21

# Disable audio bell
enable_audio_bell no

# Enable TrueColor
enable_experimental_conformance true

# Image support
# Kitty natively supports inline images, so no additional configuration is needed.

# Scrollback buffer
scrollback_lines 10000

# Window padding
padding_width 5
padding_height 5

# Transparency
background_opacity 0.9

# Keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Enable ligatures
enable_ligatures true

# Cursor shape and behavior
cursor_shape block
cursor_blink_interval 0.5

# Terminal features
allow_remote_control yes
remember_window_size yes

# Optimize performance
# For systems with high GPU memory, increase this value.
gpu_memory_chunk_size_mb 32

# Kitty protocol for images
# Allows direct support for viewing images (e.g., with `icat`).
