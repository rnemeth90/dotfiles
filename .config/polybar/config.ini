[module/wifi]
type = custom/script
exec = nmcli -t -f WIFI general | sed 's/^enabled//;s/^disabled/睊/' # Icons: enabled -> , disabled -> 睊

# click-left = ~/.config/polybar/scripts/wifi-menu.sh
click-left = ~/bin/wifi-menu.sh
interval = 10
