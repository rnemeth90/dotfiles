[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10

# decorations = "Buttonless"

opacity = 0.7
blur = true

option_as_alt = "Both"

[font]
normal.family = 'Hack Nerd Font'
bold.family = 'Hack Nerd Font'
italic.family = 'Hack Nerd Font'
size = 18

[terminal.shell]
program = "/bin/bash"
args = ["-l"]

[keyboard]
bindings = [
   { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" }
]
